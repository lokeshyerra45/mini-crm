<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mini CRM Sign Up</title>

    <link rel="stylesheet"
          href="css/style.css">
</head>

<body>

<div class="login-container">

    <div class="login-card">

        <div class="logo-section">

            <h1>Create Account</h1>

            <p>Join Mini CRM</p>

        </div>

        <div class="input-group">

            <label for="name">
                Full Name
            </label>

            <input
                type="text"
                id="name"
                placeholder="Enter your full name">

        </div>

        <div class="input-group">

            <label for="email">
                Email
            </label>

            <input
                type="email"
                id="email"
                placeholder="Enter your email">

        </div>

        <div class="input-group">

            <label for="password">
                Password
            </label>

            <input
                type="password"
                id="password"
                placeholder="Enter your password">

        </div>

        <div class="input-group">

            <label for="role">
                Role
            </label>

            <select id="role">

                <option value="ADMIN">
                    Admin
                </option>

                <option value="EMPLOYEE">
                    Employee
                </option>

            </select>

        </div>

        <button
            type="button"
            class="login-btn"
            onclick="registerUser()">

            Sign Up

        </button>

        <p style="margin-top:15px;text-align:center;">

            Already have an account?

            <a href="login.html">
                Login
            </a>

        </p>

    </div>

</div>

<script src="js/signup.js"></script>

</body>

</html>
